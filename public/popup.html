<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Block Site</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="popup.css">
  <link rel="icon" type="image/png" href="icon_32.png">
  <script type="module" src="popup.mjs"></script>
</head>

<body>
  <div class="popup-container">
    <h2>
      <img src="icon_32.png" alt="Block Site">
      <span>Block Site</span>
    </h2>

    <div id="time-limit-section" class="section">
      <div class="time-remaining">
        <span class="label">Time remaining today:</span>
        <span id="time-display" class="time-value">--:--</span>
      </div>

      <div id="time-exhausted-section" class="exhausted-section hidden">
        <p class="exhausted-message">Daily time limit reached!</p>
        <button id="grant-extra-btn" class="grant-btn">+5 Minutes</button>
        <p id="extra-grants-info" class="extra-info"></p>
      </div>
    </div>

    <div id="time-limit-disabled" class="section hidden">
      <p class="disabled-message">Daily time limit is disabled.</p>
    </div>

    <div class="footer">
      <a id="options-link" href="#">Open Options</a>
    </div>
  </div>
</body>

</html>
